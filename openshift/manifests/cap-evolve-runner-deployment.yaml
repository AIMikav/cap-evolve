# =============================================================================
# cap-evolve Persistent Runner
#
# An always-on pod for interactive optimization runs. Exec in, copy your
# project config onto the workspace PVC, and run cap-evolve interactively.
#
# Usage:
#   oc apply -f cap-evolve-runner-deployment.yaml
#   oc cp .capevolve/project cap-evolve/<pod>:/workspace/.capevolve/project
#   oc exec -it deployment/cap-evolve-runner -- bash
#   cd /workspace && cap-evolve run --spec .capevolve/project/capevolve.yaml \
#     --project .capevolve/project --run-ts run1 --dashboard off
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cap-evolve-runner
  namespace: cap-evolve
  labels:
    app: cap-evolve-runner
    app.kubernetes.io/part-of: cap-evolve
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cap-evolve-runner
  template:
    metadata:
      labels:
        app: cap-evolve-runner
    spec:
      serviceAccountName: cap-evolve-runner
      containers:
        - name: runner
          image: quay.io/<YOUR_ORG>/cap-evolve-runner:latest
          env:
            # --- Python / cap-evolve ---
            - name: PYTHONPATH
              value: "/workspace/.capevolve/project/adapters:/app"
            - name: CAPEVOLVE_SKILLS_DIR
              value: "/app/skills"
            - name: TAU2_DATA_DIR
              value: "/app/tau2-bench/data"
            # --- Agent model (vLLM via model_config.py convention) ---
            - name: MODEL
              value: "openai/qwen2.5-7b-instruct"
            - name: OPENAI_API_BASE
              value: "http://vllm-agent:80/v1"
            - name: OPENAI_API_KEY
              value: "dummy"
            - name: TAU2_MAX_CONCURRENCY
              value: "30"
            # --- Optimizer ---
            # The optimizer is a coding-agent CLI (claude-code, codex, gemini-cli, …)
            # configured via optimizer_skill in capevolve.yaml.
            # For claude-code: set ANTHROPIC_API_KEY (or log in interactively).
            # For other agents: see skills/optimizers/registry.yaml.
          resources:
            requests:
              cpu: 500m
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 8Gi
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: cap-evolve-workspace
