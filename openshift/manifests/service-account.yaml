# ServiceAccount used by the cap-evolve runner and vLLM pods.
# The anyuid SCC binding is required because vLLM containers run processes
# as non-root UIDs that don't match OpenShift's default restricted range.
#
# NOTE: The anyuid SCC is broad — it allows containers to run as any UID.
# For production, consider a custom SCC scoped to the specific UIDs your
# containers need, or use a non-root UID range that matches your images.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cap-evolve-runner
  namespace: cap-evolve
  labels:
    app.kubernetes.io/part-of: cap-evolve
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cap-evolve-runner-anyuid
  namespace: cap-evolve
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: cap-evolve-runner
    namespace: cap-evolve
