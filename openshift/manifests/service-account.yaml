# ServiceAccount used by both the cap-evolve runner and vLLM pods.
# The anyuid SCC binding is required because vLLM and some benchmark
# containers run processes as non-root UIDs that don't match OpenShift's
# default restricted range.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: harbor-task
  namespace: cap-evolve
  labels:
    app.kubernetes.io/part-of: cap-evolve
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: harbor-task-anyuid
  namespace: cap-evolve
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: harbor-task
    namespace: cap-evolve
