# ------------------------------------------------------------------
# Secrets template — fill in real values before applying.
# NEVER commit this file with real credentials.
# ------------------------------------------------------------------

# HuggingFace token (used by vLLM to download gated models like Llama, Qwen, etc.).
# Get yours at: https://huggingface.co/settings/tokens
apiVersion: v1
kind: Secret
metadata:
  name: hf-token
  namespace: cap-evolve
  labels:
    app.kubernetes.io/part-of: cap-evolve
type: Opaque
stringData:
  HF_TOKEN: "<YOUR_HUGGINGFACE_TOKEN>"
