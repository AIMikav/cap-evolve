# =============================================================================
# cap-evolve Optimizer Job
#
# Runs a single optimization pass as a Kubernetes Job.
#
# Before applying this Job, copy your project config onto the workspace PVC.
# The project config (.capevolve/project/) is generated by the intake phase:
#   cap-evolve check .capevolve/project
#
# To populate the PVC, deploy the persistent runner first, exec in, and copy:
#   oc cp .capevolve/project cap-evolve/<runner-pod>:/workspace/.capevolve/project
# =============================================================================

# --- PVC: workspace for run artifacts (results persist after Job completes) ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cap-evolve-workspace
  namespace: cap-evolve
  labels:
    app.kubernetes.io/part-of: cap-evolve
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# --- Job: one-shot optimizer run ---
apiVersion: batch/v1
kind: Job
metadata:
  name: cap-evolve-run
  namespace: cap-evolve
  labels:
    app.kubernetes.io/part-of: cap-evolve
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400       # auto-cleanup after 24h
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: harbor-task
      containers:
        - name: cap-evolve
          image: quay.io/<YOUR_ORG>/cap-evolve-runner:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              cd /workspace
              cap-evolve run \
                --spec /workspace/.capevolve/project/capevolve.yaml \
                --project /workspace/.capevolve/project \
                --run-ts run1 \
                --dashboard off
          workingDir: /workspace
          env:
            # --- Python / cap-evolve ---
            - name: PYTHONPATH
              value: "/workspace/.capevolve/project/adapters:/app"
            - name: CAPEVOLVE_SKILLS_DIR
              value: "/app/skills"
            - name: TAU2_DATA_DIR
              value: "/app/tau2-bench/data"
            # --- Agent model (vLLM, cross-namespace) ---
            - name: TAU2_MODEL
              value: "openai/qwen2.5-7b-instruct"
            - name: TAU2_API_BASE
              value: "http://vllm-agent:80/v1"
            - name: TAU2_API_KEY
              value: "dummy"
            - name: TAU2_MAX_CONCURRENCY
              value: "30"
            - name: TAU2_LLM_TIMEOUT
              value: "240"
            - name: TAU2_LLM_RETRIES
              value: "2"
            - name: TAU2_INFRA_RETRIES
              value: "2"
            # --- Optimizer model (vLLM, cross-namespace) ---
            - name: OPTIMIZER_MODEL
              value: "openai/qwen2.5-14b-instruct"
            - name: OPTIMIZER_API_BASE
              value: "http://vllm-optimizer:80/v1"
            - name: OPTIMIZER_API_KEY
              value: "dummy"
          resources:
            requests:
              cpu: 500m
              memory: 4Gi
            limits:
              cpu: "2"
              memory: 8Gi
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: cap-evolve-workspace
