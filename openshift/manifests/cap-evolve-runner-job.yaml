# =============================================================================
# cap-evolve Optimizer Job
#
# Runs a single optimization pass as a Kubernetes Job.
#
# Before applying this Job, copy your project config onto the workspace PVC.
# The project config (.capevolve/project/) is generated by the intake phase:
#   cap-evolve check .capevolve/project
#
# To populate the PVC, deploy the persistent runner first, exec in, and copy:
#   oc cp .capevolve/project cap-evolve/<runner-pod>:/workspace/.capevolve/project
# =============================================================================

apiVersion: batch/v1
kind: Job
metadata:
  name: cap-evolve-run
  namespace: cap-evolve
  labels:
    app.kubernetes.io/part-of: cap-evolve
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400       # auto-cleanup after 24h
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: cap-evolve-runner
      containers:
        - name: cap-evolve
          image: quay.io/<YOUR_ORG>/cap-evolve-runner:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              cd /workspace
              cap-evolve run \
                --spec /workspace/.capevolve/project/capevolve.yaml \
                --project /workspace/.capevolve/project \
                --run-ts run1 \
                --dashboard off
          workingDir: /workspace
          env:
            # --- Python / cap-evolve ---
            - name: PYTHONPATH
              value: "/workspace/.capevolve/project/adapters:/app"
            - name: CAPEVOLVE_SKILLS_DIR
              value: "/app/skills"
            - name: TAU2_DATA_DIR
              value: "/app/tau2-bench/data"
            # --- Agent model (vLLM via model_config.py convention) ---
            - name: MODEL
              value: "openai/qwen2.5-7b-instruct"
            - name: OPENAI_API_BASE
              value: "http://vllm-agent:80/v1"
            - name: OPENAI_API_KEY
              value: "dummy"
            - name: TAU2_MAX_CONCURRENCY
              value: "30"
            - name: TAU2_LLM_TIMEOUT
              value: "240"
            - name: TAU2_LLM_RETRIES
              value: "2"
            - name: TAU2_INFRA_RETRIES
              value: "2"
            # --- Optimizer ---
            # The optimizer is a coding-agent CLI (claude-code, codex, gemini-cli, …)
            # configured via optimizer_skill in capevolve.yaml.
            # For claude-code: set ANTHROPIC_API_KEY (or log in interactively).
            # For other agents: see skills/optimizers/registry.yaml.
            # To use a fully self-hosted optimizer, set optimizer_skill: generic
            # and CAPEVOLVE_OPTIMIZER_CMD to your agent CLI command.
          resources:
            requests:
              cpu: 500m
              memory: 4Gi
            limits:
              cpu: "2"
              memory: 8Gi
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: cap-evolve-workspace
